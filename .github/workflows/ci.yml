name: CI
on: [push, pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: cd backend && pip install '.[test]' && ruff check app tests && pytest
      - run: docker build backend
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: android-actions/setup-android@v3
      - run: cd android && ./gradlew testDebugUnitTest lintDebug assembleDebug
      - run: mkdir -p artifacts && cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/bechad-debug.apk
      - uses: actions/upload-artifact@v4
        with: { name: bechad-debug-apk, path: artifacts/bechad-debug.apk }
